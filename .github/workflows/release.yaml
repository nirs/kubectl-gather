---
name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-binaries:
    name: Release binaries
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: arm64
            goos: windows
    steps:
    - uses: actions/checkout@v6
    - uses: wangyoucao577/go-release-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: go.mod
        md5sum: FALSE
        compress_assets: OFF
        build_command: make

  container:
    name: Container
    uses: ./.github/workflows/container.yaml

  release-container:
    name: Release container
    permissions:
      packages: write
    runs-on: ubuntu-latest
    needs: container
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Download multiarch image
        uses: actions/download-artifact@v7
        with:
          name: gather
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push container
        run: make container-multiarch-push REPO=${{ github.repository_owner }}
