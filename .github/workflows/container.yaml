---
name: Container

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:

  container-native:
    name: Build ${{ matrix.goarch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-24.04
          - goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git describe --tags 2>/dev/null || git tag latest
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Build and save image
        run: make gather-${{ matrix.goarch }}.tar
      - name: Upload image
        uses: actions/upload-artifact@v6
        with:
          name: gather-${{ matrix.goarch }}
          path: gather-${{ matrix.goarch }}.tar
          compression-level: 0
          retention-days: 1

  container-multiarch:
    name: Build multiarch image
    runs-on: ubuntu-latest
    needs: container-native
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git describe --tags 2>/dev/null || git tag latest
      - name: Download images
        uses: actions/download-artifact@v7
        with:
          pattern: gather-*
          merge-multiple: true
      - name: Create multiarch image
        run: |
          podman load -i gather-amd64.tar
          podman load -i gather-arm64.tar
          make container-multiarch
      - name: Save multiarch image
        run: make gather.tar
      - name: Upload multiarch image
        uses: actions/upload-artifact@v6
        with:
          name: gather
          path: gather.tar
          compression-level: 0
