---
name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  lint:
    name: Check code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build-matrix:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: arm64
            goos: windows
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git tag latest
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Build binary
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make

  e2e-matrix:
    name: E2E (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git tag latest
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install minikube
        run: |
          curl --fail --silent --show-error --location --output minikube \
              https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-${{ matrix.goarch }}
          sudo install minikube /usr/local/bin/
          minikube version
      - name: Install oc
        run: |
          url="https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux"
          if [ "${{ matrix.goarch }}" != "amd64" ]; then
              url="${url}-${{ matrix.goarch }}"
          fi
          curl --fail --silent --show-error --location --output oc.tar.gz "${url}.tar.gz"
          tar xzf oc.tar.gz oc
          sudo install oc /usr/local/bin/
          oc version --client
      - name: Run e2e tests
        run: make e2e-tests
      # Tar manually to work around github limitations with special characters
      # (:) in file names, and getting much smaller archives compared with zip.
      # https://github.com/actions/upload-artifact/issues/546
      - name: Archive test artifacts
        if: always()
        run: |
          find e2e/out -maxdepth 1 -name 'test-*' > artifacts.txt
          tar --create \
              --gzip \
              --file kubectl-gather-e2e-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
              --transform "s|e2e/out/|kubectl-gather-e2e-${{ matrix.goos }}-${{ matrix.goarch }}/|" \
              --files-from artifacts.txt
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kubectl-gather-e2e-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kubectl-gather-e2e-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          compression-level: 0
          retention-days: 15
      - name: Delete clusters
        if: always()
        run: make clean

  unit-test-matrix:
    name: Unit test (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: arm64
            goos: windows
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: windows
            goarch: amd64
            runner: windows-latest
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git tag latest
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Download modules
        run: go mod download
      - name: Run unit tests
        run: make unit-tests
