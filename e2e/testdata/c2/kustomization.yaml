---
resources:
  - ../base
namePrefix: c2-
namespace: test-c2
patches:
  - target:
      kind: PersistentVolume
      name: pv1
    patch: |-
      # Patch the mount point to match the name prefix.
      - op: replace
        path: /spec/hostPath/path
        value: /mnt/c2-pv1
      # Pin the PV to the correct PVC to prevent random cross-binding.
      - op: replace
        path: /spec/claimRef
        value:
          name: c2-pvc1
          namespace: test-c2
